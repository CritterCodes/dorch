<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Dev Orchestrator — Spec</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f0e;
    --bg2:       #111513;
    --bg3:       #181c1a;
    --border:    #242825;
    --border2:   #2e3430;
    --fg:        #d6d4ce;
    --fg2:       #8a8d88;
    --fg3:       #555957;
    --green:     oklch(0.72 0.18 145);
    --green-dim: oklch(0.72 0.18 145 / 0.12);
    --amber:     oklch(0.74 0.16 68);
    --amber-dim: oklch(0.74 0.16 68 / 0.12);
    --red:       oklch(0.66 0.18 22);
    --red-dim:   oklch(0.66 0.18 22 / 0.12);
    --blue:      oklch(0.72 0.14 240);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--fg);
    font-size: 13px;
    line-height: 1.6;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  /* PRINT PAGE */
  @page {
    size: A4 portrait;
    margin: 1.2cm 1.5cm;
  }

  /* COVER PAGE */
  .cover {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 80px 60px;
    background: var(--bg);
    break-after: page;
  }

  .cover-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--green);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .cover-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 52px;
    font-weight: 600;
    color: var(--fg);
    line-height: 1.1;
    margin-bottom: 28px;
  }

  .cover-title em { color: var(--green); font-style: normal; }

  .cover-desc {
    font-size: 15px;
    color: var(--fg2);
    max-width: 520px;
    line-height: 1.8;
    margin-bottom: 36px;
  }

  .cover-tags {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 60px;
  }

  .cover-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 3px;
    border: 1px solid var(--border2);
    color: var(--fg3);
  }
  .cover-tag.green { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .cover-tag.amber { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }

  .cover-toc {
    border-top: 1px solid var(--border);
    padding-top: 32px;
  }

  .cover-toc-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--fg3);
    margin-bottom: 14px;
  }

  .toc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px 24px;
  }

  .toc-item {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--fg2);
    display: flex;
    gap: 8px;
  }

  .toc-num { color: var(--fg3); }

  .cover-meta {
    position: absolute;
    bottom: 40px;
    right: 60px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--fg3);
    text-align: right;
  }

  /* MAIN CONTENT */
  .main {
    padding: 0 60px;
    max-width: 860px;
    margin: 0 auto;
  }

  /* SECTION */
  .section {
    padding: 52px 0 40px;
    break-inside: avoid-page;
  }

  .section-page-break {
    break-before: page;
    padding-top: 52px;
  }

  .section-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--fg3);
    margin-bottom: 8px;
  }

  .section-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--fg);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .section-title span { color: var(--green); }

  .section-lead {
    font-size: 12px;
    color: var(--fg2);
    max-width: 620px;
    margin-bottom: 24px;
    line-height: 1.7;
  }

  hr.divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0;
  }

  /* FLOW DIAGRAM */
  .flow { display: flex; flex-direction: column; margin: 20px 0; }

  .flow-step { display: flex; align-items: flex-start; }

  .flow-left {
    display: flex; flex-direction: column; align-items: center;
    width: 32px; flex-shrink: 0;
  }

  .flow-num {
    width: 22px; height: 22px; border-radius: 50%;
    border: 1px solid var(--border2); background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--fg3); flex-shrink: 0;
  }

  .flow-step.active .flow-num {
    border-color: var(--green); color: var(--green); background: var(--green-dim);
  }

  .flow-line {
    width: 1px; flex: 1; min-height: 16px;
    background: var(--border); margin: 2px 0;
  }

  .flow-body { padding: 0 0 16px 14px; flex: 1; }
  .flow-label { font-size: 12px; color: var(--fg); font-weight: 500; margin-bottom: 1px; }
  .flow-sub { font-size: 10px; color: var(--fg3); font-family: 'JetBrains Mono', monospace; }

  /* COMPONENT CARDS */
  .component-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin: 20px 0;
  }

  .component-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 7px; padding: 14px 16px;
    break-inside: avoid;
  }

  .component-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }

  .component-icon {
    width: 24px; height: 24px; border-radius: 5px;
    background: var(--bg3); border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--green); flex-shrink: 0;
  }

  .component-name { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500; color: var(--fg); }
  .component-desc { font-size: 11px; color: var(--fg2); line-height: 1.5; margin-bottom: 8px; }

  .component-bullets { list-style: none; }
  .component-bullets li {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--fg3); padding: 1px 0 1px 10px; position: relative;
  }
  .component-bullets li::before { content: '→'; position: absolute; left: 0; color: var(--green); opacity: 0.6; }

  /* FILE TREE */
  .file-tree {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 7px; padding: 16px 20px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; line-height: 1.9;
  }
  .tree-dir { color: var(--fg2); }
  .tree-file { color: var(--fg3); }
  .tree-highlight { color: var(--green); }
  .tree-indent { padding-left: 14px; }
  .tree-indent2 { padding-left: 28px; }
  .tree-indent3 { padding-left: 42px; }

  /* MEMORY TABLE */
  .memory-table {
    width: 100%; border-collapse: collapse;
    font-family: 'JetBrains Mono', monospace; font-size: 11px; margin: 14px 0;
  }
  .memory-table th {
    text-align: left; font-size: 9px; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--fg3);
    border-bottom: 1px solid var(--border); padding: 7px 10px; font-weight: 400;
  }
  .memory-table td {
    padding: 7px 10px; border-bottom: 1px solid var(--border);
    color: var(--fg2); vertical-align: top;
  }
  .memory-table td:first-child { color: var(--green); }
  .memory-table tr:last-child td { border-bottom: none; }

  /* PRIORITY LIST */
  .priority-list { list-style: none; margin: 14px 0; }
  .priority-item {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 14px; background: var(--bg2);
    border: 1px solid var(--border); border-radius: 5px; margin-bottom: 5px;
  }
  .priority-rank { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--fg3); width: 20px; flex-shrink: 0; }
  .priority-label { font-size: 12px; color: var(--fg); flex: 1; }
  .priority-pill {
    font-family: 'JetBrains Mono', monospace; font-size: 8px;
    padding: 2px 6px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.08em;
  }
  .pill-red  { background: var(--red-dim);   color: var(--red);   border: 1px solid var(--red); }
  .pill-amber{ background: var(--amber-dim); color: var(--amber); border: 1px solid var(--amber); }
  .pill-green{ background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }

  /* CODE BLOCK */
  .code-block {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 5px;
    padding: 14px 18px; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--fg2); line-height: 1.8; margin: 14px 0;
  }
  .code-block .kw  { color: var(--green); }
  .code-block .str { color: var(--amber); }
  .code-block .cmt { color: var(--fg3); }

  /* HANDOFF CARD */
  .handoff-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 7px; padding: 14px; margin: 14px 0;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
  }
  .handoff-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .handoff-title  { color: var(--fg); font-size: 11px; font-weight: 500; }
  .handoff-meta   { color: var(--fg3); font-size: 9px; }
  .handoff-row    { display: flex; gap: 8px; margin-bottom: 5px; align-items: flex-start; }
  .handoff-key    { color: var(--fg3); min-width: 96px; }
  .handoff-val    { color: var(--fg2); }

  /* ARCH DIAGRAM */
  .arch-diagram {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 7px; padding: 24px; margin: 20px 0;
  }
  .arch-row { display: flex; gap: 8px; align-items: center; justify-content: center; margin-bottom: 8px; }
  .arch-box {
    border: 1px dashed var(--border2); border-radius: 4px;
    padding: 7px 12px; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; color: var(--fg2); text-align: center; min-width: 100px;
  }
  .arch-box.primary { border-color: var(--green); color: var(--green); background: var(--green-dim); }
  .arch-box.secondary { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }
  .arch-box.neutral { border-color: var(--border2); color: var(--fg2); }
  .arch-arrow { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--fg3); }
  .arch-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--fg3); text-align: center; margin-top: 10px; }

  /* MVP COLS */
  .mvp-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 18px 0; }
  .mvp-col-title {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;
    padding-bottom: 7px; border-bottom: 1px solid var(--border);
  }
  .mvp-col-title.include { color: var(--green); }
  .mvp-col-title.exclude { color: var(--red); }
  .mvp-item { font-size: 11px; color: var(--fg2); padding: 3px 0 3px 13px; position: relative; line-height: 1.5; }
  .mvp-item.include::before { content: '✓'; position: absolute; left: 0; color: var(--green); font-size: 9px; top: 4px; }
  .mvp-item.exclude::before { content: '✗'; position: absolute; left: 0; color: var(--red); font-size: 9px; top: 4px; }

  /* PRINCIPLES */
  .principle-row { display: flex; gap: 12px; margin-bottom: 10px; align-items: flex-start; }
  .principle-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--fg3); min-width: 24px; padding-top: 2px; }
  .principle-title { font-size: 12px; font-weight: 500; color: var(--fg); margin-bottom: 2px; }
  .principle-desc { font-size: 11px; color: var(--fg2); line-height: 1.6; }

  /* OPEN QUESTIONS */
  .question-item {
    padding: 8px 14px; border-left: 2px solid var(--border2);
    margin-bottom: 6px; font-size: 11px; color: var(--fg2); line-height: 1.6;
  }

  /* MOBILE SCREENS — print shows all 5 in a row */
  .screens-print-row {
    display: flex;
    gap: 14px;
    margin: 20px 0;
    align-items: flex-start;
    justify-content: center;
  }

  .screen-print-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .screen-print-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--fg3);
    text-align: center;
  }

  @media print {
    body { background: var(--bg) !important; }
    .cover { page-break-after: always; min-height: auto; padding: 60px 40px; }
    .section-page-break { page-break-before: always; }
    .component-card { page-break-inside: avoid; }
    .priority-item { page-break-inside: avoid; }
  }
</style>
</head>
<body>

<div id="app"></div>

<script type="text/babel" src="android-frame.jsx"></script>

<script type="text/babel">

// ── Wireframe screen components (same as Spec.html) ─────────────────────────

const WF = ({ children, style }) => (
  <div style={{
    width: '100%', height: '100%',
    background: '#0d0f0e',
    display: 'flex', flexDirection: 'column',
    fontFamily: "'JetBrains Mono', monospace",
    fontSize: 10,
    color: '#8a8d88',
    ...style,
  }}>{children}</div>
);

const WFBar = ({ title, right }) => (
  <div style={{ padding: '8px 10px', borderBottom: '1px solid #242825', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
    <span style={{ color: '#d6d4ce', fontWeight: 600, fontSize: 11 }}>{title}</span>
    {right && <span style={{ fontSize: 9, color: '#555957' }}>{right}</span>}
  </div>
);

const WFBtn = ({ label, accent, small }) => (
  <div style={{
    padding: small ? '4px 8px' : '7px 10px',
    background: accent ? 'oklch(0.72 0.18 145 / 0.12)' : '#181c1a',
    border: `1px solid ${accent ? 'oklch(0.72 0.18 145)' : '#242825'}`,
    borderRadius: 4,
    color: accent ? 'oklch(0.72 0.18 145)' : '#8a8d88',
    fontSize: 9,
    textAlign: 'center',
  }}>{label}</div>
);

const WFLog = ({ lines }) => (
  <div style={{
    background: '#111513', border: '1px solid #242825',
    borderRadius: 4, margin: '0 8px',
    padding: '6px 8px',
    fontFamily: "'JetBrains Mono', monospace",
    fontSize: 8, lineHeight: 1.65,
    flex: 1, overflow: 'hidden',
  }}>
    {lines.map((l, i) => (
      <div key={i} style={{ color: l.c || '#555957' }}>{l.t}</div>
    ))}
  </div>
);

const WFDivider = ({ label }) => (
  <div style={{ padding: '4px 10px 2px', fontSize: 8, color: '#555957', textTransform: 'uppercase', letterSpacing: '0.1em' }}>{label}</div>
);

const ScreenDashboard = () => (
  <WF>
    <WFBar title="Orchestrator" right="⚙" />
    <div style={{ margin: '7px 8px 0', padding: '8px 9px', background: 'oklch(0.72 0.18 145 / 0.08)', border: '1px solid oklch(0.72 0.18 145 / 0.3)', borderRadius: 5 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 3 }}>
        <span style={{ color: 'oklch(0.72 0.18 145)', fontSize: 8, fontWeight: 600 }}>● RUNNING</span>
        <span style={{ color: '#555957', fontSize: 7.5 }}>14m 32s</span>
      </div>
      <div style={{ color: '#d6d4ce', fontSize: 9.5, marginBottom: 1 }}>claude-cli</div>
      <div style={{ color: '#555957', fontSize: 7.5 }}>task: refactor auth module</div>
    </div>
    <WFDivider label="current task" />
    <div style={{ padding: '3px 8px 6px' }}>
      <div style={{ background: '#111513', border: '1px solid #242825', borderRadius: 4, padding: '6px 8px', fontSize: 8.5, color: '#8a8d88', lineHeight: 1.5 }}>
        Step 3/7 — Extract JWT validation<br />
        <span style={{ color: 'oklch(0.72 0.18 145)' }}>auth/validators.js</span><br />
        <span style={{ color: '#555957', fontSize: 7.5 }}>acceptance: unit tests pass</span>
      </div>
    </div>
    <WFDivider label="quick actions" />
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 5, padding: '0 8px 6px' }}>
      <WFBtn label="⏹ Stop" /><WFBtn label="⇄ Switch" />
      <WFBtn label="📋 Plan" accent /><WFBtn label="📄 Handoff" />
    </div>
    <WFDivider label="live output" />
    <WFLog lines={[
      { t: '> reading auth/index.js…', c: '#555957' },
      { t: '> writing validators.js', c: 'oklch(0.72 0.18 145)' },
      { t: '> 64 tokens/s ▌', c: '#555957' },
    ]} />
    <div style={{ height: 6 }} />
  </WF>
);

const ScreenLogs = () => (
  <WF>
    <WFBar title="Live Logs" right="↓ tail" />
    <div style={{ display: 'flex', gap: 4, padding: '5px 8px', borderBottom: '1px solid #242825' }}>
      {['all','stdout','stderr','events'].map(t => (
        <div key={t} style={{ padding: '2px 6px', borderRadius: 3, background: t==='all' ? 'oklch(0.72 0.18 145 / 0.12)' : '#181c1a', border: `1px solid ${t==='all' ? 'oklch(0.72 0.18 145)' : '#242825'}`, color: t==='all' ? 'oklch(0.72 0.18 145)' : '#555957', fontSize: 7.5 }}>{t}</div>
      ))}
    </div>
    <div style={{ flex: 1, overflow: 'hidden', padding: '6px 8px', background: '#111513', margin: '0 8px 8px', borderRadius: 4, border: '1px solid #242825', fontFamily: "'JetBrains Mono', monospace", fontSize: 8, lineHeight: 1.7 }}>
      {[
        { t: '09:14:02 [evt] agent started: claude-cli', c: '#555957' },
        { t: '09:14:03 [out] Reading global-plan.md…', c: '#8a8d88' },
        { t: '09:14:07 [out] Task: step 3 extract validators', c: '#8a8d88' },
        { t: '09:14:18 [out] Found validateJWT(), validateScope()', c: '#d6d4ce' },
        { t: '09:14:22 [out] Creating auth/validators.js', c: 'oklch(0.72 0.18 145)' },
        { t: '09:14:41 [err] ESLint: no-unused-vars ×2', c: 'oklch(0.74 0.16 68)' },
        { t: '09:14:52 [out] ▌', c: '#555957' },
      ].map((l, i) => <div key={i} style={{ color: l.c }}>{l.t}</div>)}
    </div>
  </WF>
);

const ScreenPlan = () => (
  <WF>
    <WFBar title="Global Plan" right="edit" />
    <div style={{ padding: '5px 10px', borderBottom: '1px solid #242825' }}>
      <div style={{ fontSize: 7.5, color: '#555957', marginBottom: 3 }}>auth module refactor</div>
      <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
        <div style={{ flex: 1, height: 2.5, background: '#242825', borderRadius: 2 }}>
          <div style={{ width: '42%', height: '100%', background: 'oklch(0.72 0.18 145)', borderRadius: 2 }}></div>
        </div>
        <span style={{ fontSize: 7.5, color: 'oklch(0.72 0.18 145)' }}>3/7</span>
      </div>
    </div>
    <div style={{ flex: 1, overflow: 'hidden' }}>
      {[
        { n:1, label:'Audit existing auth structure', done: true },
        { n:2, label:'Define validator interface', done: true },
        { n:3, label:'Extract JWT validators', active: true },
        { n:4, label:'Extract session middleware' },
        { n:5, label:'Write unit tests' },
        { n:6, label:'Update route handlers' },
        { n:7, label:'Integration test + cleanup' },
      ].map(s => (

            'Should review happen after every switch or only at task completion?',
            'What requires explicit user approval before proceeding? (Git commits, task changes, plan revisions)',
            'How much autonomy should agents have over git commits? Staged only, or auto-commit allowed?',
          ].map((q, i) => (
            <div className="question-item" key={i}>{q}</div>
          ))}
        </section>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);

// Auto-print after Babel + fonts load
document.fonts.ready.then(() => {
  setTimeout(() => { window.print(); }, 800);
});

</script>
</body>
</html>
